name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: native-os/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: native-os
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: native-os
        run: pnpm lint

      - name: Type check
        working-directory: native-os
        run: pnpm typecheck

      - name: Test
        working-directory: native-os
        run: pnpm test

      - name: Build
        working-directory: native-os
        run: pnpm build
